<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRWAVES — Product</title>
<link rel="icon" type="image/jpeg" href="/images/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;--surface3:#22223a;
  --green:#39ff14;--green-dim:#2bcc10;--purple:#8b5cf6;
  --blue:#06b6d4;--text:#e8e8f0;--text-dim:#9898a8;--text-muted:#58586a;
  --danger:#ef4444;--warning:#f59e0b;--success:#22c55e;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--green);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:12px 16px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}

/* Header */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,18,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--surface3);padding:0 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo-area{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none}
.logo-area img{width:42px;height:42px;border-radius:50%;object-fit:cover}
.logo-area span{font-family:'Archivo Black',sans-serif;font-size:1.3rem;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;align-items:center;gap:12px}
.header-btn{background:transparent;color:var(--text-dim);padding:8px 14px;border-radius:var(--radius-sm);font-size:.88rem;font-weight:500;transition:all .2s;border:1px solid var(--surface3)}
.header-btn:hover{color:var(--green);border-color:var(--green)}
.cart-btn{position:relative}
.cart-count{position:absolute;top:-4px;right:-4px;background:var(--green);color:#000;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}

/* Page */
.page{max-width:1200px;margin:0 auto;padding:32px 24px 80px}
.breadcrumb{font-size:.82rem;color:var(--text-muted);margin-bottom:32px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.breadcrumb a{color:var(--text-dim);transition:color .2s}
.breadcrumb a:hover{color:var(--green)}

/* Product Hero */
.product-hero{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-bottom:48px}

/* Image Section */
.image-section{position:sticky;top:92px}
.main-image{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}
.main-image img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.main-image:hover img{transform:scale(1.05)}
.main-image .no-img{font-size:8rem;opacity:.08}
.image-badges{position:absolute;top:16px;left:16px;display:flex;flex-direction:column;gap:8px}
.badge{font-size:.72rem;font-weight:700;padding:6px 14px;border-radius:50px;text-transform:uppercase;letter-spacing:.06em}
.badge-featured{background:var(--green);color:#000}
.badge-category{background:var(--purple);color:#fff}
.compliance-note{margin-top:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius-sm);font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.compliance-note svg{flex-shrink:0}

/* Details Section */
.details-section{}
.product-category{color:var(--purple);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.product-name{font-family:'Archivo Black',sans-serif;font-size:clamp(1.6rem,3vw,2.4rem);line-height:1.12;margin-bottom:16px}
.price-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.product-price{font-family:'Archivo Black',sans-serif;font-size:2.2rem;color:var(--green)}
.rating-summary{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 0}
.rating-summary:hover .review-count{color:var(--green)}
.stars{color:var(--warning);font-size:.95rem;letter-spacing:1px}
.review-count{color:var(--text-dim);font-size:.85rem;transition:color .2s}

.product-description{color:var(--text-dim);font-size:1rem;line-height:1.8;margin-bottom:28px;border-bottom:1px solid var(--surface2);padding-bottom:24px}

/* Specs */
.specs-section{margin-bottom:28px}
.specs-section h3{font-family:'Archivo Black',sans-serif;font-size:.95rem;margin-bottom:14px;color:var(--text)}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.spec-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius-sm);padding:14px 18px;transition:border-color .2s}
.spec-card:hover{border-color:var(--surface3)}
.spec-card label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:4px}
.spec-card .value{font-weight:700;font-size:1rem;color:var(--text)}
.spec-card .value.highlight{color:var(--green)}

/* Stock */
.stock-row{display:flex;align-items:center;gap:8px;margin-bottom:24px;padding:12px 16px;background:var(--surface);border-radius:var(--radius-sm)}
.stock-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stock-text{font-size:.88rem;font-weight:600}

/* Purchase */
.purchase-section{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.qty-label{font-size:.82rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.qty-ctrl{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--surface3);border-radius:var(--radius-sm);overflow:hidden}
.qty-ctrl button{width:44px;height:44px;background:transparent;color:var(--text);font-size:1.3rem;font-weight:700;transition:all .2s}
.qty-ctrl button:hover{background:var(--surface3);color:var(--green)}
.qty-ctrl span{width:48px;text-align:center;font-weight:700;font-size:1.05rem}
.qty-total{font-size:.9rem;color:var(--text-muted)}
.btn{padding:14px 28px;border-radius:var(--radius);font-weight:700;font-size:.95rem;transition:all .25s;display:inline-flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em;width:100%}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green-dim);transform:translateY(-1px);box-shadow:0 4px 24px rgba(57,255,20,.35)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;border:2px solid var(--surface3);color:var(--text-dim);margin-top:8px}
.btn-outline:hover{border-color:var(--green);color:var(--green)}

/* Tabs */
.tabs-section{margin-top:48px;margin-bottom:48px}
.tab-nav{display:flex;gap:0;border-bottom:2px solid var(--surface2);margin-bottom:28px}
.tab-btn{padding:14px 24px;background:transparent;color:var(--text-muted);font-size:.9rem;font-weight:600;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-content{display:none;animation:fadeIn .3s ease}
.tab-content.active{display:block}

/* Reviews */
.reviews-header{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:32px;flex-wrap:wrap}
.reviews-summary{display:flex;align-items:center;gap:24px}
.big-rating{text-align:center}
.big-rating .number{font-family:'Archivo Black',sans-serif;font-size:3rem;line-height:1;color:var(--green)}
.big-rating .stars{font-size:1.1rem;margin:4px 0}
.big-rating .count{font-size:.82rem;color:var(--text-muted)}
.rating-bars{display:flex;flex-direction:column;gap:6px;min-width:200px}
.rating-bar{display:flex;align-items:center;gap:8px;font-size:.82rem}
.rating-bar .label{width:14px;text-align:right;color:var(--text-dim)}
.rating-bar .bar{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.rating-bar .fill{height:100%;background:var(--warning);border-radius:4px;transition:width .5s ease}
.rating-bar .num{width:24px;text-align:right;color:var(--text-muted);font-size:.78rem}

.review-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:24px;margin-bottom:12px}
.review-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.reviewer-info{display:flex;align-items:center;gap:12px}
.reviewer-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff}
.reviewer-name{font-weight:700;font-size:.9rem}
.reviewer-badge{font-size:.7rem;padding:2px 8px;border-radius:50px;background:rgba(57,255,20,.1);color:var(--green);font-weight:600}
.review-date{font-size:.78rem;color:var(--text-muted)}
.review-stars{color:var(--warning);font-size:.85rem;letter-spacing:1px;margin-bottom:6px}
.review-title{font-weight:700;font-size:.95rem;margin-bottom:6px}
.review-body{color:var(--text-dim);font-size:.9rem;line-height:1.7}

/* Review Form */
.review-form{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:24px;margin-top:20px}
.review-form h4{font-family:'Archivo Black',sans-serif;font-size:1rem;margin-bottom:16px}
.star-input{display:flex;gap:4px;margin-bottom:14px}
.star-input button{font-size:1.5rem;background:transparent;color:var(--surface3);transition:color .15s}
.star-input button.active,.star-input button:hover{color:var(--warning)}
.review-form .field{margin-bottom:14px}
.review-form label{display:block;font-size:.78rem;font-weight:600;margin-bottom:6px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.btn-submit-review{width:auto;padding:10px 24px}

/* Details Tab */
.details-content{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.detail-block{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);padding:24px}
.detail-block h4{font-family:'Archivo Black',sans-serif;font-size:.95rem;margin-bottom:12px;color:var(--green)}
.detail-block ul{list-style:none;padding:0}
.detail-block li{padding:8px 0;border-bottom:1px solid var(--surface2);font-size:.9rem;color:var(--text-dim);display:flex;justify-content:space-between}
.detail-block li:last-child{border-bottom:none}
.detail-block li span{color:var(--text);font-weight:600}

/* Related */
.related-section{margin-top:48px;margin-bottom:32px}
.related-section h2{font-family:'Archivo Black',sans-serif;font-size:1.4rem;margin-bottom:24px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.related-card{background:var(--surface);border:1px solid var(--surface2);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .3s}
.related-card:hover{border-color:var(--surface3);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.related-card-img{aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;opacity:.15;overflow:hidden}
.related-card-img img{width:100%;height:100%;object-fit:cover;opacity:1}
.related-card-info{padding:14px}
.related-card-info h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.related-card-info .price{color:var(--green);font-weight:700;font-size:.95rem}
.related-card-info .mini-stars{color:var(--warning);font-size:.72rem;margin-top:2px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;padding:12px 24px;border-radius:var(--radius);font-weight:700;font-size:.88rem;z-index:999;transition:transform .3s;box-shadow:0 8px 30px rgba(57,255,20,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}

.spinner{width:40px;height:40px;border:3px solid var(--surface3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:80px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

footer{background:var(--surface);border-top:1px solid var(--surface2);padding:32px 24px;text-align:center}
footer .brand{font-family:'Archivo Black',sans-serif;font-size:1rem;color:var(--green);margin-bottom:6px}
footer p{color:var(--text-muted);font-size:.8rem}

@media(max-width:768px){
  .product-hero{grid-template-columns:1fr;gap:28px}
  .image-section{position:static}
  .specs-grid{grid-template-columns:1fr}
  .details-content{grid-template-columns:1fr}
  .reviews-summary{flex-direction:column;align-items:flex-start}
  .tab-btn{padding:12px 16px;font-size:.82rem}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo-area" href="/">
      <img src="/images/logo.jpg" alt="AIRWAVES">
      <span>AIRWAVES</span>
    </a>
    <div class="header-actions">
      <button class="header-btn" onclick="window.location.href='/'">← Shop</button>
      <button class="header-btn cart-btn" onclick="window.location.href='/'">
        Cart <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<div class="page" id="pageContent">
  <div class="spinner" id="spinner"></div>
</div>

<div class="toast" id="toast"></div>

<footer>
  <div class="brand">((( AIRWAVES )))</div>
  <p>Premium hemp products, lab-tested for quality and compliance.</p>
  <p style="margin-top:4px">All products contain less than 0.3% THC. &copy; 2026 AIRWAVES v4.1</p>
</footer>

<script>
let product = null;
let reviews = { reviews: [], summary: { count: 0, average: 0, distribution: [0,0,0,0,0] } };
let qty = 1;
let reviewRating = 0;
let sessionId = localStorage.getItem('aw_session') || ('s_' + Math.random().toString(36).substr(2,12));
localStorage.setItem('aw_session', sessionId);
let authToken = localStorage.getItem('aw_token');
let currentUser = null;

async function api(path, options = {}) {
  const opts = { headers: { 'Content-Type': 'application/json' }, ...options };
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  const sep = path.includes('?') ? '&' : '?';
  const url = path + sep + 'session=' + sessionId;
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function renderStars(rating, size = '') {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty);
}

function getInitial(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return parts[0][0].toUpperCase();
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return diff + ' days ago';
  if (diff < 30) return Math.floor(diff / 7) + ' weeks ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError('No product specified.'); return; }

  // Check auth
  if (authToken) {
    try {
      const data = await api('/api/auth?action=me');
      currentUser = data.user;
    } catch { authToken = null; localStorage.removeItem('aw_token'); }
  }

  try {
    const [productData, reviewsData, cartData] = await Promise.all([
      fetch('/api/products?id=' + id + '&session=' + sessionId).then(r => r.json()),
      fetch('/api/reviews?product_id=' + id).then(r => r.json()),
      api('/api/cart')
    ]);

    if (productData.error) { showError('Product not found.'); return; }
    product = productData;
    reviews = reviewsData;

    // Update cart badge
    if (cartData.count > 0) {
      const el = document.getElementById('cartCount');
      el.textContent = cartData.count;
      el.style.display = 'flex';
    }

    document.title = 'AIRWAVES — ' + product.name;
    renderPage();
  } catch (err) {
    console.error(err);
    showError('Failed to load product. Please try again.');
  }
}

function renderPage() {
  document.getElementById('spinner').style.display = 'none';
  const page = document.getElementById('pageContent');

  const stockColor = product.stock > 10 ? 'var(--success)' : product.stock > 0 ? 'var(--warning)' : 'var(--danger)';
  const stockText = product.stock > 10 ? 'In Stock — Ready to Ship' : product.stock > 0 ? `Low Stock — Only ${product.stock} left` : 'Out of Stock';
  const outOfStock = product.stock === 0;

  const specs = [];
  if (product.category) specs.push({ label: 'Category', val: product.category });
  if (product.strain_type && product.strain_type !== 'N/A') specs.push({ label: 'Strain Type', val: product.strain_type, highlight: true });
  if (product.thc_content) specs.push({ label: 'THC Content', val: product.thc_content });
  if (product.cbd_content) specs.push({ label: 'CBD Content', val: product.cbd_content, highlight: true });
  if (product.weight) specs.push({ label: 'Weight / Size', val: product.weight });
  specs.push({ label: 'Lab Tested', val: 'Yes — COA Available', highlight: true });

  const s = reviews.summary;
  const maxBar = Math.max(...s.distribution, 1);

  page.innerHTML = `
    <div class="breadcrumb">
      <a href="/">Shop</a> <span>›</span>
      <a href="/?category=${encodeURIComponent(product.category || '')}">${esc(product.category || 'Products')}</a> <span>›</span>
      <span style="color:var(--text)">${esc(product.name)}</span>
    </div>

    <div class="product-hero">
      <!-- IMAGE -->
      <div class="image-section">
        <div class="main-image">
          ${product.image_url ? `<img src="${esc(product.image_url)}" alt="${esc(product.name)}">` : '<div class="no-img">🌿</div>'}
          <div class="image-badges">
            ${product.featured ? '<span class="badge badge-featured">Featured</span>' : ''}
            ${product.category ? `<span class="badge badge-category">${esc(product.category)}</span>` : ''}
          </div>
        </div>
        <div class="compliance-note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
          Third-party lab tested &middot; Federal Farm Bill compliant &middot; Ships to all legal states
        </div>
      </div>

      <!-- DETAILS -->
      <div class="details-section">
        <div class="product-category">${esc(product.category || '')}</div>
        <h1 class="product-name">${esc(product.name)}</h1>

        <div class="price-row">
          <div class="product-price">$${parseFloat(product.price).toFixed(2)}</div>
          ${s.count > 0 ? `
          <div class="rating-summary" onclick="switchTab('reviews')">
            <span class="stars">${renderStars(s.average)}</span>
            <span class="review-count">${s.average} (${s.count} review${s.count !== 1 ? 's' : ''})</span>
          </div>` : ''}
        </div>

        <p class="product-description">${esc(product.description || 'Premium quality hemp product from AIRWAVES. Lab-tested for purity and potency.')}</p>

        <div class="specs-section">
          <h3>Product Specs</h3>
          <div class="specs-grid">
            ${specs.map(sp => `
              <div class="spec-card">
                <label>${sp.label}</label>
                <div class="value${sp.highlight ? ' highlight' : ''}">${esc(sp.val)}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="stock-row">
          <div class="stock-dot" style="background:${stockColor}"></div>
          <span class="stock-text" style="color:${stockColor}">${stockText}</span>
        </div>

        <div class="purchase-section">
          <div class="qty-row">
            <span class="qty-label">Quantity</span>
            <div class="qty-ctrl">
              <button onclick="changeQty(-1)">−</button>
              <span id="qtyDisplay">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
            <span class="qty-total" id="qtyTotal">$${parseFloat(product.price).toFixed(2)}</span>
          </div>
          <button class="btn btn-primary" id="addCartBtn" onclick="addToCart()" ${outOfStock ? 'disabled' : ''}>
            ${outOfStock ? 'Out of Stock' : 'Add to Cart'}
          </button>
          <button class="btn btn-outline" onclick="window.location.href='/'">Continue Shopping</button>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs-section">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('details')" data-tab="details">Details</button>
        <button class="tab-btn" onclick="switchTab('reviews')" data-tab="reviews">Reviews (${s.count})</button>
      </div>

      <!-- DETAILS TAB -->
      <div class="tab-content active" id="detailsTab">
        <div class="details-content">
          <div class="detail-block">
            <h4>Product Information</h4>
            <ul>
              <li>Product <span>${esc(product.name)}</span></li>
              ${product.category ? `<li>Category <span>${esc(product.category)}</span></li>` : ''}
              ${product.strain_type && product.strain_type !== 'N/A' ? `<li>Strain Type <span>${esc(product.strain_type)}</span></li>` : ''}
              ${product.weight ? `<li>Weight / Size <span>${esc(product.weight)}</span></li>` : ''}
              <li>Price <span style="color:var(--green)">$${parseFloat(product.price).toFixed(2)}</span></li>
            </ul>
          </div>
          <div class="detail-block">
            <h4>Lab Results</h4>
            <ul>
              ${product.thc_content ? `<li>THC <span>${esc(product.thc_content)}</span></li>` : ''}
              ${product.cbd_content ? `<li>CBD <span style="color:var(--green)">${esc(product.cbd_content)}</span></li>` : ''}
              <li>Pesticides <span style="color:var(--success)">Not Detected</span></li>
              <li>Heavy Metals <span style="color:var(--success)">Not Detected</span></li>
              <li>Microbials <span style="color:var(--success)">Pass</span></li>
              <li>Farm Bill Compliant <span style="color:var(--success)">Yes</span></li>
            </ul>
          </div>
        </div>
      </div>

      <!-- REVIEWS TAB -->
      <div class="tab-content" id="reviewsTab">
        ${s.count > 0 ? `
        <div class="reviews-header">
          <div class="reviews-summary">
            <div class="big-rating">
              <div class="number">${s.average}</div>
              <div class="stars">${renderStars(s.average)}</div>
              <div class="count">${s.count} review${s.count !== 1 ? 's' : ''}</div>
            </div>
            <div class="rating-bars">
              ${[5,4,3,2,1].map(i => `
                <div class="rating-bar">
                  <span class="label">${i}</span>
                  <div class="bar"><div class="fill" style="width:${(s.distribution[i-1]/maxBar)*100}%"></div></div>
                  <span class="num">${s.distribution[i-1]}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>` : '<p style="color:var(--text-muted);margin-bottom:20px">No reviews yet. Be the first to review this product!</p>'}

        <div id="reviewsList">
          ${reviews.reviews.map(r => `
            <div class="review-card">
              <div class="review-top">
                <div class="reviewer-info">
                  <div class="reviewer-avatar">${getInitial(r.reviewer_name)}</div>
                  <div>
                    <div class="reviewer-name">${esc(r.reviewer_name)}</div>
                    ${r.verified_purchase ? '<span class="reviewer-badge">Verified Purchase</span>' : ''}
                  </div>
                </div>
                <span class="review-date">${timeAgo(r.created_at)}</span>
              </div>
              <div class="review-stars">${renderStars(r.rating)}</div>
              ${r.title ? `<div class="review-title">${esc(r.title)}</div>` : ''}
              <div class="review-body">${esc(r.body)}</div>
            </div>
          `).join('')}
        </div>

        ${currentUser ? `
        <div class="review-form" id="reviewForm">
          <h4>Write a Review</h4>
          <div class="star-input" id="starInput">
            ${[1,2,3,4,5].map(i => `<button onclick="setRating(${i})" data-star="${i}">☆</button>`).join('')}
          </div>
          <div class="field">
            <label>Title</label>
            <input type="text" id="reviewTitle" placeholder="Sum it up in a few words">
          </div>
          <div class="field">
            <label>Review</label>
            <textarea id="reviewBody" rows="4" placeholder="What did you think of this product?"></textarea>
          </div>
          <button class="btn btn-primary btn-submit-review" onclick="submitReview()">Submit Review</button>
        </div>
        ` : `<p style="margin-top:20px;color:var(--text-muted);font-size:.9rem"><a href="/" style="color:var(--green)">Sign in</a> to leave a review.</p>`}
      </div>
    </div>

    <!-- RELATED -->
    <div class="related-section" id="relatedSection"></div>
  `;

  loadRelated();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  document.getElementById(tab + 'Tab')?.classList.add('active');
}

function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('qtyDisplay').textContent = qty;
  document.getElementById('qtyTotal').textContent = '$' + (parseFloat(product.price) * qty).toFixed(2);
}

async function addToCart() {
  const btn = document.getElementById('addCartBtn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Adding...';
  try {
    await api('/api/cart', { method: 'POST', body: JSON.stringify({ product_id: product.id, quantity: qty }) });
    toast('Added to cart!');
    btn.textContent = 'Added ✓';
    setTimeout(() => { btn.textContent = 'Add to Cart'; btn.disabled = false; }, 1500);
    // Update cart badge
    const cartData = await api('/api/cart');
    const el = document.getElementById('cartCount');
    el.textContent = cartData.count;
    el.style.display = cartData.count > 0 ? 'flex' : 'none';
  } catch (err) {
    toast('Error adding to cart', true);
    btn.textContent = 'Add to Cart';
    btn.disabled = false;
  }
}

function setRating(r) {
  reviewRating = r;
  document.querySelectorAll('#starInput button').forEach(b => {
    const star = parseInt(b.dataset.star);
    b.textContent = star <= r ? '★' : '☆';
    b.classList.toggle('active', star <= r);
  });
}

async function submitReview() {
  if (!reviewRating) { toast('Please select a star rating', true); return; }
  try {
    await api('/api/reviews', { method: 'POST', body: JSON.stringify({
      product_id: product.id,
      rating: reviewRating,
      title: document.getElementById('reviewTitle').value.trim(),
      body: document.getElementById('reviewBody').value.trim()
    })});
    toast('Review submitted! Thank you.');
    // Reload reviews
    reviews = await fetch('/api/reviews?product_id=' + product.id).then(r => r.json());
    renderPage();
    switchTab('reviews');
  } catch (err) {
    toast(err.message, true);
  }
}

async function loadRelated() {
  try {
    const all = await fetch('/api/products?session=' + sessionId).then(r => r.json());
    const related = all.filter(p => p.id !== product.id && p.category === product.category).slice(0, 4);
    if (related.length === 0) return;
    const el = document.getElementById('relatedSection');
    if (!el) return;
    el.innerHTML = `
      <h2>More ${esc(product.category)} Products</h2>
      <div class="related-grid">
        ${related.map(p => `
          <div class="related-card" onclick="window.location.href='/product.html?id=${p.id}'">
            <div class="related-card-img">
              ${p.image_url ? `<img src="${esc(p.image_url)}" alt="${esc(p.name)}">` : '🌿'}
            </div>
            <div class="related-card-info">
              <h4>${esc(p.name)}</h4>
              <div class="price">$${parseFloat(p.price).toFixed(2)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } catch {}
}

function showError(msg) {
  document.getElementById('pageContent').innerHTML = `
    <div style="text-align:center;padding:80px 20px">
      <div style="font-size:3rem;margin-bottom:16px">🌿</div>
      <h2 style="margin-bottom:8px;font-family:'Archivo Black',sans-serif">${msg}</h2>
      <a href="/" class="btn btn-outline" style="margin-top:20px;display:inline-flex;width:auto">Back to Shop</a>
    </div>
  `;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--danger)' : 'var(--green)';
  el.style.color = isError ? '#fff' : '#000';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
